<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" fill="#030712"/>
    <g transform="translate(156, 156) scale(4.76)">
        <defs>
            <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#818cf8" />
                <stop offset="100%" stop-color="#c084fc" />
            </linearGradient>
            <filter id="glow">
                <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
        <circle cx="21" cy="21" r="18" stroke="url(#neuralGrad)" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
        <circle cx="21" cy="21" r="14" stroke="url(#neuralGrad)" stroke-width="1" opacity="0.5"/>
        <path d="M21 7V14" stroke="url(#neuralGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M21 28V35" stroke="url(#neuralGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M7 21H14" stroke="url(#neuralGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M28 21H35" stroke="url(#neuralGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
        <circle cx="21" cy="21" r="5" fill="url(#neuralGrad)" filter="url(#glow)">
            <animate attributeName="r" values="4.5;5.5;4.5" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="21" cy="7" r="2" fill="#818cf8" />
        <circle cx="21" cy="35" r="2" fill="#c084fc" />
        <circle cx="7" cy="21" r="2" fill="#818cf8" />
        <circle cx="35" cy="21" r="2" fill="#c084fc" />
    </g>
</svg>
