<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0b0f1a" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Neural Pattern Background -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="2" fill="#818cf8" />
    <circle cx="200" cy="150" r="2" fill="#c084fc" />
    <circle cx="150" cy="300" r="2" fill="#818cf8" />
    <circle cx="400" cy="100" r="2" fill="#c084fc" />
    <circle cx="600" cy="200" r="2" fill="#818cf8" />
    <circle cx="700" cy="350" r="2" fill="#c084fc" />
    <circle cx="300" cy="400" r="2" fill="#818cf8" />
    
    <path d="M100 100 L200 150 L400 100 L600 200 L700 350" stroke="#818cf8" stroke-width="0.5" fill="none" />
    <path d="M150 300 L200 150 L300 400 L700 350" stroke="#c084fc" stroke-width="0.5" fill="none" />
  </g>

  <!-- Welcome Text -->
  <text x="400" y="210" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="64" fill="white" filter="url(#glow)">Welcome to</text>
  <text x="400" y="280" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="82" fill="url(#accentGrad)" filter="url(#glow)">Trend-AI</text>
  
  <!-- Subtext -->
  <text x="400" y="340" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" fill="#9ca3af" opacity="0.8">Your Daily Pulse on Artificial Intelligence &amp; Future Tech</text>
  
  <!-- Decorative Lines -->
  <rect x="350" y="370" width="100" height="2" rx="1" fill="url(#accentGrad)" opacity="0.5" />
</svg>
