<!DOCTYPE html>
<html lang="en" class="dark" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Tools List 2026 | Categorized Directory - Trend-AI</title>
    <meta name="description" content="Explore the ultimate list of AI tools categorized by use case. Find the best AI software for every task in our curated directory.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .ultimate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .category-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .category-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }
        .category-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 8px;
            font-size: 1.2rem;
        }
        .category-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
        }
        .tool-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .tool-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tool-item:last-child { border-bottom: none; }
        .tool-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            transition: color 0.2s;
            flex-grow: 1;
        }
        .tool-link:hover { color: var(--accent); }
        .tool-favicon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            background: #2d3748;
        }
        .tool-pricing-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }
        .category-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--card-border);
            text-align: center;
        }
        .view-all-link {
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .view-all-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container header-content">
            <a href="/" class="logo">
                <span class="logo-text">Trend<span class="accent-text">-AI</span></span>
            </a>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/about.html">About</a>
                <a href="/tools.html" class="active">AI Tools</a>
                <a href="/contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-bottom: 80px;">
        <div class="page-header" style="text-align: center; margin-top: 60px;">
            <h1 style="font-size: 3.5rem; font-family: 'Space Grotesk', sans-serif;">Ultimate AI Tools List</h1>
            <p style="color: var(--text-secondary); font-size: 1.2rem; max-width: 700px; margin: 20px auto;">
                The most comprehensive directory of artificial intelligence tools, categorized by use case and updated daily.
            </p>
        </div>

        <div id="ultimateGrid" class="ultimate-grid">
            <div class="loading-spinner" style="grid-column: 1/-1; text-align: center; padding: 100px;">Analyzing Directory...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('ultimateGrid');
            
            // Fetch all tools from Supabase
            const { tools } = await window.supabaseAPI.fetchTools(1000, 0);
            
            if (!tools || tools.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">No tools found. Run the sync script!</div>';
                return;
            }

            // Group tools by category
            const categories = {};
            tools.forEach(tool => {
                if (!categories[tool.category]) categories[tool.category] = [];
                if (categories[tool.category].length < 10) {
                    categories[tool.category].push(tool);
                }
            });

            grid.innerHTML = Object.keys(categories).map(catName => `
                <div class="category-card">
                    <div class="category-header">
                        <div class="category-icon">⚡</div>
                        <div class="category-title">${catName}</div>
                    </div>
                    <ul class="tool-list">
                        ${categories[catName].map(tool => `
                            <li class="tool-item">
                                <a href="${tool.url}" target="_blank" class="tool-link">
                                    <img src="${tool.image || 'https://www.google.com/s2/favicons?domain=' + tool.url}" class="tool-favicon" alt="">
                                    ${tool.name}
                                </a>
                                <span class="tool-pricing-tag">${tool.pricing || 'Free'}</span>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="category-footer">
                        <a href="#" class="view-all-link">See all ${catName} tools →</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
