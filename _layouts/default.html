    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div id="scrollProgress" class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
    
    {% include header.html %}
    
    <main class="container">
        {{ content }}
    </main>
    
    {% include footer.html %}
    
    <div id="lightbox" class="lightbox"><span class="lightbox-close">&times;</span><img class="lightbox-content" id="lightboxImg" alt="Expanded image view"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    
    <script>
      window.searchDataUrl = "{{ '/search.json' | relative_url }}";
    </script>
</body>
</html>
